<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>WhiteBoard4Me</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0a1a33;
        user-select: none;
        -webkit-user-select: none;
        font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', 'Segoe UI', sans-serif;
      }

      .splash {
        display: flex;
        align-items: center;
        gap: 18px;
        height: 100%;
        padding: 18px 22px;
        box-sizing: border-box;
      }

      .logo {
        width: 68px;
        height: 68px;
        flex-shrink: 0;
        object-fit: contain;
        border-radius: 14px;
        pointer-events: none;
      }

      .content {
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 5px;
        min-width: 0;
      }

      .title {
        margin: 0;
        font-size: 22px;
        font-weight: 700;
        color: #ffffff;
        line-height: 1.15;
        letter-spacing: -0.02em;
        pointer-events: none;
      }

      .credit {
        margin: 0;
        font-size: 14px;
        font-weight: 500;
        color: #ffffff;
        line-height: 1.25;
        pointer-events: none;
      }

      .credit .name {
        color: #f4c430;
        font-weight: 700;
      }

      .url {
        margin: 0;
        font-size: 11px;
        font-weight: 400;
        color: #a8b4c4;
        line-height: 1.25;
        text-decoration: none;
        cursor: pointer;
        width: fit-content;
      }

      .url:hover {
        color: #d4deea;
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="splash">
      <img class="logo" src="splash-icon.png" alt="" />
      <div class="content">
        <h1 class="title" id="app-title">WhiteBoard4Me</h1>
        <p class="credit">Made by <span class="name" id="author-name">청년안민규</span></p>
        <a class="url" id="blog-url" href="https://note4all.tistory.com">https://note4all.tistory.com</a>
      </div>
    </div>
    <script>
      const params = new URLSearchParams(window.location.search);

      const title = params.get('title');
      if (title) {
        document.title = title;
        const titleEl = document.getElementById('app-title');
        if (titleEl) titleEl.textContent = title;
      }

      const authorName = params.get('author');
      if (authorName) {
        const authorEl = document.getElementById('author-name');
        if (authorEl) authorEl.textContent = authorName;
      }

      const blogUrl = params.get('blog');
      if (blogUrl) {
        const blogEl = document.getElementById('blog-url');
        if (blogEl) {
          blogEl.textContent = blogUrl;
          blogEl.href = blogUrl;
        }
      }
    </script>
  </body>
</html>
